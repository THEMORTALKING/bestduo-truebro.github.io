<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЭКСПЕРИМЕНТ-2•УГЛУБЛЕНИЕ</title>
    <style>
        /* 🌿 ЛЕСНАЯ ТРОПА — УГЛУБЛЕНИЕ */
        body {
            background: #2b4f3b;
            color: #e9f2e6;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            transition: all 0.3s ease;
        }
        
        h1 {
            color: #d9b650;
            font-size: 48px;
            text-shadow: 0 2px 10px rgba(217, 182, 80, 0.3);
        }
        
        .bro {
            color: #bf6f4a;
            font-weight: bold;
        }
        
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #1e3a2e;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #d9b650;
        }
        
        .highlight {
            background: #bf6f4a;
            color: #1e3a2e;
            padding: 5px 10px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        a {
            color: #d9b650;
            text-decoration: none;
            border-bottom: 1px dashed #d9b650;
        }
        
        a:hover {
            color: #bf6f4a;
            border-bottom-color: #bf6f4a;
        }
    </style>
</head>
<body>

    <h1>ЭКСПЕРИМЕНТ <span class="bro">2</span></h1>
    <h2 style="color: #d9b650;">🌿 УГЛУБЛЕНИЕ</h2>
    
    <div class="container">
        <p style="font-size: 20px;">Мы входим в лес знаний...</p>
        <p>Здесь мы будем учить <span class="highlight">JavaScript</span> по-настоящему.</p>
        
        <!-- СЮДА БУДЕМ ДОБАВЛЯТЬ НАШ КОД -->
        
        <div style="margin-top: 30px;">
            <a href="../index.html">← Нулевая История</a> • 
            <a href="../ЭКСПЕРИМЕНТ 1/index.html">🌱 Эксперимент 1</a>
        </div>
    </div>

    <!-- ЛЕСНОЙ СЧЁТЧИК -->
<div style="background: #1e3a2e; padding: 30px; border-radius: 20px; margin: 30px 0; border: 2px solid #d9b650;">

    <h3 style="color: #d9b650; margin-top: 0; font-size: 24px;">
        🌲 СЧЁТЧИК ЗНАНИЙ В ЛЕСУ
    </h3>

    <div id="userName"></div>
    
    <p style="color: #e9f2e6; margin-bottom: 20px;">
        Сколько шишек знаний ты собрал?
    </p>
    
    <div id="counter" style="font-size: 72px; font-weight: bold; 
        color: #d9b650; margin: 20px 0; text-shadow: 0 5px 15px rgba(217, 182, 80, 0.3);">
        0
    </div>
    
    <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
        <button id="collect" style="background: #d9b650; 
            color: #1e3a2e; border: none; padding: 12px 30px; 
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;">
            🌰 Собрать шишку
        </button>
        
        <button id="reset" style="background: #bf6f4a; color: #e9f2e6; 
            border: none; padding: 12px 30px; border-radius: 50px; 
            font-size: 18px; font-weight: bold; cursor: pointer;">
            🔄 Новый день
        </button>

        <button id="ageButton" style="background: #d9b650; 
            color: #1e3a2e; border: none; padding: 12px 30px;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: 
                pointer; margin-top: 10px;">
            🌲 Стать мудрее (+1 год)
        </button>

        <button id="findItem" style="background: #bf6f4a; 
            color: #e9f2e6; border: none; padding: 12px 30px; 
            border-radius: 50px; font-size: 18px; font-weight: 
            bold; cursor: pointer; margin-top: 10px;">
            🍄 Найти предмет в лесу
        </button>
        
    </div>
    
    <p id="message" style="color: #bf6f4a; margin-top: 20px; min-height: 30px;">
        👣 Ты только вошёл в лес...
    </p>
    
</div>

   <script>
    // 🌿 ЭКСПЕРИМЕНТ 2: УГЛУБЛЕНИЕ

    // 1. Переменные
    let knowledgeCount = 0;

    // 2. Объект исследователя
    const forestExplorer = {
        name: "BEST BRO",
        age: 26,
        isLearning: true,
        favoriteItem: "🌰 шишка"
    };

    // 3. Находим элементы
    const counterDisplay = document.getElementById('counter');
    const buttonCollect = document.getElementById('collect');
    const buttonReset = document.getElementById('reset');
    const messageDisplay = document.getElementById('message');
    const ageButton = document.getElementById('ageButton');
    const infoDiv = document.getElementById('userName');

    // 4. Функция обновления сообщения
    function updateMessage() {
        if (knowledgeCount === 0) {
            messageDisplay.textContent = "👣 Ты только вошёл в лес...";
        } else if (knowledgeCount < 5) {
            messageDisplay.textContent = "🌱 Ты собираешь первые шишки!";
        } else if (knowledgeCount < 10) {
            messageDisplay.textContent = "🌿 Твой рюкзак тяжелеет...";
        } else {
            messageDisplay.textContent = "🌟 Ты настоящий лесной мастер!";
        }
    }

    // 5. Кнопка "Собрать шишку"
    buttonCollect.addEventListener('click', function() {
        knowledgeCount = knowledgeCount + 1;
        counterDisplay.textContent = knowledgeCount;
        updateMessage();
    });

    // 6. Кнопка "Новый день"
    buttonReset.addEventListener('click', function() {
        if (confirm('Точно начать новый день? Все шишки пропадут!')) {
            knowledgeCount = 0;
            counterDisplay.textContent = knowledgeCount;
            updateMessage();
        }
    });

    // 7. Кнопка "Стать мудрее"
    ageButton.addEventListener('click', function() {
        forestExplorer.age = forestExplorer.age + 1;
        infoDiv.innerHTML = `👤 Имя: ${forestExplorer.name} | Возраст: ${forestExplorer.age} | Любит: ${forestExplorer.favoriteItem}`;
    });

    // 8. Показываем начальные значения
    updateMessage();
    infoDiv.innerHTML = `👤 Имя: ${forestExplorer.name} | Возраст: ${forestExplorer.age} | Любит: ${forestExplorer.favoriteItem}`;
    console.log("Лес знаний открыт!");

       // Инвентарь исследователя (массив)
    let inventory = [];

    // Функция для показа инвентаря
    function showInventory() {
        if (inventory.length === 0) {
            return "🎒 Инвентарь: пока пусто";
        } else {
            return "🎒 Найдено: " + inventory.join(" • ");
        }
    }

       // Кнопка "Найти предмет"
    const findButton = document.getElementById('findItem');
    const items = ["🌰 шишка", "🍂 лист", "🌿 ветка", "🍄 гриб", "🐚 улитка"];

    findButton.addEventListener('click', function() {
    const randomIndex = Math.floor(Math.random() * items.length);
    const foundItem = items[randomIndex];
    inventory.push(foundItem);
    
    // Показываем инвентарь
    let inventoryDiv = document.getElementById('inventory');
    if (!inventoryDiv) {
        const newDiv = document.createElement('div');
        newDiv.id = 'inventory';
        newDiv.style.marginTop = '20px';
        newDiv.style.color = '#d9b650';
        newDiv.style.fontSize = '18px';
        newDiv.style.padding = '10px';
        newDiv.style.background = '#1e3a2e';
        newDiv.style.borderRadius = '10px';
        document.querySelector('.container').appendChild(newDiv);
        inventoryDiv = newDiv;
    }
        inventoryDiv.innerHTML = showInventory();
    });
   </script>
</body>
</html>
